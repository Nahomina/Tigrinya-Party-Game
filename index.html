<!DOCTYPE html>
<html lang="ti" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f11" />
  <meta name="description" content="Mayim — A Tigrinya word-guessing party game" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Mayim" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=14" />
  <title>Mayim — ማይም</title>
</head>
<body class="home-body">

  <div class="home-wrap">

    <header class="home-header">
      <div class="home-game-title">Tigrinya Traditional Games</div>
      <p class="home-tagline">TIGRINYA · PARTY · GAME</p>
    </header>

    <main class="home-cards" role="main">

      <a href="game.html?mode=words" class="home-card home-card--words" aria-label="Play Mayim — Words game">
        <span class="home-card-icon" aria-hidden="true">📝</span>
        <div class="home-card-names">
          <span class="home-card-name">MAYIM</span>
          <span class="home-card-geez" lang="ti">ማይም</span>
        </div>
        <p class="home-card-desc">Describe the word without saying it</p>
        <span class="home-card-cta">Play →</span>
      </a>

      <a href="game.html?mode=proverbs" class="home-card home-card--proverbs" aria-label="Play Misla — Proverbs game">
        <span class="home-card-icon" aria-hidden="true">📜</span>
        <div class="home-card-names">
          <span class="home-card-name">MISLA</span>
          <span class="home-card-geez" lang="ti">ምስላ</span>
        </div>
        <p class="home-card-desc">Complete the Tigrinya proverb</p>
        <span class="home-card-cta">Play →</span>
      </a>

    </main>

    <footer class="home-footer">
      <a href="admin.html" class="home-admin-link" aria-label="Admin panel">⚙</a>
    </footer>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
